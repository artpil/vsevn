<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>vsevn.ru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/vsevn-i.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header__content">
      <div class="logo">
        <img src="img/logo.svg" alt="">
      </div>

      <ul class="header__nav">
        <li><a href="#" class="header__nav-item"><i class="vsevn-icon-h icon-i-manager-h"></i><i class="vsevn-icon icon-i-manager"></i><span>ЖУРНАЛ МЕНЕДЖЕРОВ</span></a></li>
        <li><a href="#" class="header__nav-item active"><i class="vsevn-icon-h icon-i-resume-h"></i><i class="vsevn-icon icon-i-resume"></i><span>РЕЗЮМЕ</span></a></li>
        <li><a href="#" class="header__nav-item"><i class="vsevn-icon-h icon-i-company-h"></i><i class="vsevn-icon icon-i-company"></i><span>КОМПАНИИ</span></a></li>
        <li><a href="#" class="header__nav-item"><i class="vsevn-icon-h icon-i-import-h"></i><i class="vsevn-icon icon-i-import"></i><span>ИМПОРТ</span></a></li>
        <li><a href="#" class="header__nav-item"><i class="vsevn-icon-h icon-i-ads-h"></i><i class="vsevn-icon icon-i-ads"></i><span>ОБЪЯВЛЕНИЯ</span></a></li>
        <li><a href="#" class="header__nav-item"><i class="vsevn-icon-h icon-i-email-h"></i><i class="vsevn-icon icon-i-email"></i><span>EMAIL ПИСЬМА</span></a></li>
        <li><a href="#" class="header__nav-item"><i class="vsevn-icon-h icon-i-envelope-h"></i><i class="vsevn-icon icon-i-envelope"></i><span>EMAIL НАСТРОЙКИ</span></a></li>
      </ul>
    </div>


  </div>
</header>


<main>
  <section class="import-section">
    <div class="container">
      <div class="import-card">
        <h2 class="import-card__title">Импорт из xml/xlsx/dosx</h2>

        <div class="import-card__row">
          <!-- Блок с датами -->
          <div class="import-card__dates">
            <div class="date-input">
              <span class="date-input__label">ДАТА ОТ</span>
              <span class="date-input__value">12.05.2023</span>
            </div>
            <div class="date-input">
              <span class="date-input__label">ДАТА ДО</span>
              <span class="date-input__value">12.05.2023</span>
            </div>
          </div>
        </div>

        <div class="import-card__controls">
          <!-- Выбор типа файла -->
          <div class="control-group control-group--type">
            <label class="control-label">Укажите тип файла</label>
            <div class="select-wrapper">
              <select class="form-select">
                <option value=""></option>
                <option value="xml">XML</option>
                <option value="xlsx">XLSX</option>
              </select>
            </div>
          </div>


          <div class="control-group control-group--path">
            <label class="control-label">Укажите путь к файлу</label>
            <div class="input-file-wrapper">
              <input type="text" class="form-input" id="file-name" placeholder="" readonly>
              <div class="attach-icon-container">
                <img src="img/i-attachment.svg" alt="Прикрепить">
              </div>
              <input type="file" class="real-file-input" id="file-upload" title="Прикрепить файл">
            </div>
          </div>

          <!-- Кнопка действия -->
          <div class="control-group control-group--btn">
            <button class="btn-submit">Начать Импорт</button>
          </div>
        </div>
      </div>
    </div>
  </section>





</main>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const navItems = document.querySelectorAll('.header__nav-item');
    function removeActiveClass() {
      navItems.forEach(item => {
        item.classList.remove('active');
      });
    }
    navItems.forEach(item => {
      item.addEventListener('click', function(event) {
        removeActiveClass();
        this.classList.add('active');
      });
    });
  });
  document.getElementById('file-upload').addEventListener('change', function() {
    const fileName = this.files[0] ? this.files[0].name : "Файл не выбран";
    document.getElementById('file-name').value = fileName;
  });
</script>
</body>
</html>
